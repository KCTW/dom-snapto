<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>dom-snapto 測試</title>
  <style>
    body { font-family: sans-serif; padding: 24px; max-width: 640px; }
    #target {
      border: 2px solid #333;
      padding: 20px;
      background: #f9f9f9;
    }
    #target img { max-width: 120px; vertical-align: middle; margin-right: 12px; }
    .row { display: flex; align-items: center; margin-bottom: 12px; }
    button { margin-top: 16px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    label { display: block; margin-top: 12px; font-size: 14px; }
    label input { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
    #log { margin-top: 16px; color: #555; font-size: 13px; white-space: pre-wrap; }
    #preview { margin-top: 16px; max-width: 100%; border: 1px solid #ccc; display: none; }
  </style>
</head>
<body>

  <h1>dom-snapto 測試</h1>

  <div id="target">
    <h2>訂單摘要</h2>
    <div class="row">
      <img src="https://thumbnail.image.rakuten.co.jp/@0_mall/milicute-himawari/cabinet/10096580/xzt-2775-2.jpg?_ex=128x128" alt="商品圖">
      <div>
        <strong>測試商品 A × 2</strong><br>
        優惠券：SAVE100
      </div>
    </div>
    <p><strong>總金額：NT$ 899</strong></p>
  </div>

  <label>
    Image proxy URL（選填，用於跨域圖片，例如 Cloudflare Worker）：
    <input id="proxy" type="text" value="https://img-proxy.kctw-dev.workers.dev" placeholder="https://your-worker.workers.dev">
  </label>

  <button id="btn">截圖 #target</button>

  <div id="log">點按鈕開始截圖。</div>
  <img id="preview" alt="截圖預覽">

  <script src="src/dom-snapto.js"></script>
  <script>
    DomSnapto.init({});

    document.getElementById('btn').addEventListener('click', function () {
      var log = document.getElementById('log');
      var preview = document.getElementById('preview');
      var proxy = document.getElementById('proxy').value.trim();
      log.textContent = '截圖中…';

      DomSnapto.capture('#target', {
        scale:    2,
        format:   'jpeg',
        quality:  0.9,
        imgProxy: proxy || undefined,
        onSuccess: function (blob) {
          var url = URL.createObjectURL(blob);
          preview.src = url;
          preview.style.display = 'block';
          log.textContent = '截圖完成，大小：' + blob.size + ' bytes';

          var a = document.createElement('a');
          a.href = url;
          a.download = 'snapshot-test.jpg';
          a.click();
        },
        onError: function (err) {
          log.textContent = '截圖失敗：' + err.message;
        },
      });
    });
  </script>

</body>
</html>
